services:
  kafka:
    image: apache/kafka:latest
    container_name: insightflow-kafka
    ports:
      - "127.0.0.1:9092:9092"  # Exposed on localhost only for security
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      # Cost Optimization: Limit Kafka JVM heap memory to 512MB
      KAFKA_OPTS: "-Xmx512M -Xms512M"
    volumes:
      - kafka_prod_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: insightflow-redis
    # Cost Optimization: Minimal footprint out of the box
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"  # Loopback only for security
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-django
    ports:
      - "8000:8000"  # Expose web API on port 8000
    env_file:
      - .env.prod
    volumes:
      - ./backend/ml/models/artifacts:/app/ml/models/artifacts
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-celery
    command: celery -A config worker --loglevel=info --concurrency=2
    env_file:
      - .env.prod
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount model artifacts so they can be loaded by PyTorch
      - ./backend/ml/models/artifacts:/app/ml/models/artifacts
    restart: unless-stopped

  kafka_consumers:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insightflow-consumers
    command: python manage.py run_kafka_consumers
    env_file:
      - .env.prod
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  kafka_prod_data:
  redis_prod_data:
