<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InsightFlow — Demo</title>
  <script src="../sdk/insightflow.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #05050A; color: #EAEAFA; display: flex; min-height: 100vh; }
    .sidebar { width: 340px; background: #0A0A18; padding: 24px; display: flex; flex-direction: column; gap: 20px; border-right: 1px solid #1E1E3A; }
    .main { flex: 1; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
    h1 { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #22D3EE, #EC4899); -webkit-background-clip: text; color: transparent; }
    h2 { font-size: 14px; font-weight: 600; color: #8888B0; text-transform: uppercase; letter-spacing: 0.05em; }
    label { font-size: 12px; font-weight: 500; color: #8888B0; display: block; margin-bottom: 4px; }
    input, select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #1E1E3A; background: #05050A; color: #EAEAFA; font-size: 13px; }
    input:focus { outline: none; border-color: #22D3EE; box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.08); }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-primary { background: rgba(34, 211, 238, 0.1); color: #22D3EE; }
    .badge-green { background: rgba(16, 185, 129, 0.1); color: #34D399; }
    .badge-yellow { background: rgba(245, 158, 11, 0.1); color: #FBBF24; }
    .badge-red { background: rgba(239, 68, 68, 0.1); color: #F87171; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: #fff; }
    .btn:hover { opacity: 0.9; }
    .btn-primary { background: linear-gradient(135deg, #22D3EE, #06B6D4); }
    .btn-green { background: #10B981; }
    .btn-yellow { background: #CA8A04; }
    .btn-red { background: #DC2626; }
    .btn-purple { background: #9333EA; }
    .btn-gray { background: #1E1E3A; border: 1px solid #2A2A50; }
    .btn-sm { padding: 4px 10px; font-size: 11px; }
    .event-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .log-area { flex: 1; background: #05050A; border: 1px solid #1E1E3A; border-radius: 8px; padding: 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; overflow-y: auto; max-height: 400px; }
    .log-entry { padding: 6px 0; border-bottom: 1px solid #0A0A18; display: flex; gap: 8px; align-items: flex-start; }
    .log-time { color: #606088; white-space: nowrap; flex-shrink: 0; }
    .log-event { color: #22D3EE; font-weight: 600; }
    .log-status { font-size: 11px; }
    .config-row { display: flex; gap: 8px; }
    .config-row input { flex: 1; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.green { background: #34D399; }
    .status-dot.red { background: #F87171; }
    .status-bar { display: flex; gap: 24px; padding: 12px 16px; background: #0A0A18; border-radius: 8px; font-size: 13px; border: 1px solid #1E1E3A; }
    .status-item { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h1>InsightFlow</h1>
    <div>
      <label>API Key</label>
      <div class="config-row">
        <input id="apiKey" value="08f72e85c4a72a51f7620951c6c638157a4e0189aa0ac69497196c55deb79fa0" />
      </div>
    </div>
    <div>
      <label>API Host</label>
      <input id="apiHost" value="http://localhost:8000" />
    </div>
    <div>
      <label>User ID</label>
      <div class="config-row">
        <input id="userId" placeholder="auto-generated" />
        <button class="btn btn-gray btn-sm" onclick="generateUser()">New</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="initSDK()">Initialize SDK</button>
    <div id="initStatus" style="font-size:12px;color:#64748b;">Not initialized</div>
  </div>

  <div class="main">
    <div class="status-bar">
      <span class="status-item"><span id="sdkDot" class="status-dot red"></span>SDK: <span id="sdkStatus">offline</span></span>
      <span class="status-item"><span id="userDot" class="status-dot green"></span>User: <span id="displayUser">—</span></span>
      <span class="status-item">Events sent: <span id="eventCount">0</span></span>
    </div>

    <div>
      <h2 style="margin-bottom:8px">Quick Events</h2>
      <div class="event-grid">
        <button class="btn btn-green" onclick="fire('signup')">Signup</button>
        <button class="btn btn-primary" onclick="fire('login')">Login</button>
        <button class="btn btn-yellow" onclick="fire('view_product', { id: 101, name: 'Wireless Mouse' })">View Product</button>
        <button class="btn btn-purple" onclick="fire('add_to_cart', { product_id: 101, price: 29.99 })">Add to Cart</button>
        <button class="btn btn-red" onclick="fire('purchase', { order_id: 'ORD-' + Date.now(), total: 29.99, currency: 'USD' })">Purchase</button>
        <button class="btn btn-gray" onclick="fire('exit')">Exit</button>
      </div>
    </div>

    <div>
      <h2 style="margin-bottom:8px">Custom Event</h2>
      <div style="display:flex;gap:8px">
        <input id="customEvent" placeholder="event_name" style="max-width:200px" />
        <input id="customProps" placeholder='{"key": "value"}' style="flex:1" />
        <button class="btn btn-primary" onclick="fireCustom()">Send</button>
      </div>
    </div>

    <div>
      <h2 style="margin-bottom:8px">Event Log</h2>
      <div id="log" class="log-area">
        <div style="color:#64748b;">SDK not initialized. Click "Initialize SDK" to start.</div>
      </div>
    </div>
  </div>

  <script>
    var count = 0;

    function log(eventName, status, detail) {
      var el = document.getElementById('log');
      var time = new Date().toLocaleTimeString();
      var entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = '<span class="log-time">' + time + '</span>' +
        '<span class="log-event">' + eventName + '</span>' +
        '<span class="log-status" style="color:' + (status === 'ok' ? '#4ade80' : '#f87171') + '">' + status + '</span>' +
        (detail ? '<span style="color:#94a3b8;font-size:11px">' + detail + '</span>' : '');
      el.insertBefore(entry, el.firstChild);
      if (el.children.length > 100) el.removeChild(el.lastChild);
    }

    function initSDK() {
      var key = document.getElementById('apiKey').value.trim();
      var host = document.getElementById('apiHost').value.trim();
      var uid = document.getElementById('userId').value.trim();

      if (!key) { alert('Enter an API key'); return; }

      var opts = { apiHost: host };
      if (uid) opts.userId = uid;

      InsightFlow.init(key, opts);

      document.getElementById('sdkDot').className = 'status-dot green';
      document.getElementById('sdkStatus').textContent = 'online';
      document.getElementById('initStatus').textContent = 'SDK initialized';
      document.getElementById('initStatus').style.color = '#4ade80';
      document.getElementById('log').innerHTML = '';
      log('System', 'ok', 'SDK initialized with host: ' + host);
      updateUser();
    }

    function fire(eventName, props) {
      if (!InsightFlow.initialized) {
        log(eventName, 'queued', 'SDK not initialized — event queued');
        InsightFlow.track(eventName, props);
        return;
      }
      InsightFlow.track(eventName, props);
      log(eventName, 'sent', props ? JSON.stringify(props) : '');
      count++;
      document.getElementById('eventCount').textContent = count;
    }

    function fireCustom() {
      var name = document.getElementById('customEvent').value.trim();
      var props = document.getElementById('customProps').value.trim();
      if (!name) { alert('Enter an event name'); return; }
      var parsed = {};
      if (props) { try { parsed = JSON.parse(props); } catch (e) { alert('Invalid JSON'); return; } }
      fire(name, parsed);
      document.getElementById('customEvent').value = '';
      document.getElementById('customProps').value = '';
    }

    function generateUser() {
      var id = 'user_' + Math.random().toString(36).substr(2, 8);
      document.getElementById('userId').value = id;
      if (InsightFlow.initialized) {
        InsightFlow.identify(id);
        updateUser();
        log('System', 'ok', 'Switched to user: ' + id);
      }
    }

    function updateUser() {
      var el = document.getElementById('displayUser');
      try { el.textContent = localStorage.getItem('if_user_id') || '—'; } catch (e) { el.textContent = '—'; }
    }

    updateUser();
  </script>
</body>
</html>
